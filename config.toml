# rhadios works catalog.
# `type` selects the parse adapter in pipeline/perseus.py:
#   dialogue  -> Plato prose (<div section> + <p><said><label>)
#   drama     -> Sophocles/Euripides verse (<sp><speaker><l n>)   [SEAM: stub]
#   epic      -> Homer hexameter (<div book>/<l n>, card chunks)  [SEAM: stub]
# `sections_per_chunk` controls chunk size (N sections for prose, ignored/
# repurposed by drama/epic adapters).

[work.meno]
id      = "meno"
cts     = "tlg0059.tlg024.perseus-grc2"
title   = "Μένων"
author  = "Πλάτων"
type    = "dialogue"
sections_per_chunk = 1
model   = "google/gemini-3-flash-preview"

